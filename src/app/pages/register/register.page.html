<ion-content [fullscreen]="true">
  <div class="auth-container">

    <div class="header-section">
      <h1 class="serif-text title">Booksmatch</h1>
    </div>

    <div class="tab-header">
      <!--<div class="tab" routerLink="/login">LOGIN</div>-->
      <div class="tab active">SIGN UP</div>
    </div>

    <form class="auth-form">

      <div class="input-group">
        <label>NOMBRE COMPLETO</label>
        <ion-item lines="none" class="custom-input">
          <ion-input type="text" placeholder="Tú nombre completo" [(ngModel)]="name" name="name"></ion-input>
        </ion-item>
      </div>

      <div class="input-group">
        <label>EMAIL </label>
        <ion-item lines="none" class="custom-input">
          <ion-input type="email" placeholder="your@gmail.com" [(ngModel)]="email" name="email"></ion-input>
        </ion-item>
      </div>

      <div class="input-group">
        <label>PASSWORD</label>
        <ion-item lines="none" class="custom-input">
          <ion-input type="password" placeholder="********" [(ngModel)]="pass" name="pass"></ion-input>
        </ion-item>
      </div>

      <div class="input-group">
        <label>CONFIRMAR PASSWORD</label>
        <ion-item lines="none" class="custom-input">
          <ion-input type="password" placeholder="********" [(ngModel)]="confirmPass" name="confirmPass"></ion-input>
        </ion-item>
      </div>

      <ion-button expand="block" mode="ios" class="btn-join" (click)="signUp()">
        Únete a BooksMatch <ion-icon name="arrow-forward-outline" slot="end"></ion-icon>
      </ion-button>
    </form>

    <div class="divider">O CONTINÚA CON</div>

    <div class="social-buttons">
      <ion-button fill="outline" mode="ios" class="social-btn">
        <img src="assets/images/google.svg" class="social-icon">
        <span>Google</span>
      </ion-button>

      <ion-button fill="outline" mode="ios" class="social-btn">
        <img src="assets/images/facebook.svg" class="social-icon">
        <span>Facebook</span>
      </ion-button>
    </div>

    <p class="footer-text">
      Al crear una cuenta, aceptas nuestros <strong>Términos de servicio</strong> y <strong>nuestra Política de privacidad </strong>.
    </p>
  </div>
</ion-content>
